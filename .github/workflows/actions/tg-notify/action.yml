name: tg-notify
description: Send a stage status message to Telegram.

inputs:
  token:
    description: Telegram bot token
    required: true
  chat:
    description: Telegram chat id
    required: true
  stage:
    description: Pipeline stage name
    required: true
  status:
    description: Job status (success/failure/cancelled)
    required: true
  extra:
    description: Optional extra HTML line
    required: false
    default: ""

runs:
  using: composite
  steps:
    - shell: bash
      env:
        TG_TOKEN: ${{ inputs.token }}
        TG_CHAT: ${{ inputs.chat }}
        STAGE: ${{ inputs.stage }}
        STATUS: ${{ inputs.status }}
        EXTRA: ${{ inputs.extra }}
      run: |
        case "$STATUS" in
          success)   icon="✅" ;;
          failure)   icon="❌" ;;
          cancelled) icon="🚫" ;;
          *)         icon="▶️" ;;
        esac
        text="${icon} <b>${STAGE}</b>: ${STATUS}"
        if [ -n "$EXTRA" ]; then
          text="${text}
        ${EXTRA}"
        fi
        curl -s -X POST \
          "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
          -d chat_id="${TG_CHAT}" \
          -d parse_mode=HTML \
          -d disable_web_page_preview=true \
          --data-urlencode text="${text}" >/dev/null || true
