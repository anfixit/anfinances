# Production-окружение: postgres + backend + nginx + certbot (HTTPS).
#
# Отличия от dev:
# - postgres не публикует порт наружу
# - backend без --reload и без volume-маунта кода
# - nginx терминирует HTTPS, проксирует /api/* в backend, раздаёт фронтенд
# - certbot выпускает и автообновляет Let's Encrypt сертификат
#
# Первый сертификат:  ./scripts/init-letsencrypt.sh
# Запуск:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Overlay поверх docker-compose.yml.

services:
  postgres:
    ports: !reset []
    restart: always

  backend:
    restart: always
    volumes: !reset []
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports: !reset []
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    container_name: anfinances-nginx
    restart: always
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    # Периодический reload — подхватить обновлённый certbot'ом сертификат.
    command: >-
      /bin/sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot
    container_name: anfinances-certbot
    restart: always
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    # Автообновление каждые 12 часов.
    entrypoint: >-
      /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done"

volumes:
  certbot-etc:
    name: anfinances_certbot_etc
  certbot-www:
    name: anfinances_certbot_www
