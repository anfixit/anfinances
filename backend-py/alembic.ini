# Конфигурация Alembic.
# URL базы данных берётся из app.config (через env.py), не из этого файла.

[alembic]
script_location = alembic
prepend_sys_path = .
# Шаблон имени файла миграции: <дата>_<rev>_<slug>.py — удобно для git diff.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
timezone = UTC
# Длина slug в имени файла — иначе очень короткие.
truncate_slug_length = 60
# Версии БД ищем здесь.
version_locations = %(here)s/alembic/versions
sqlalchemy.url = driver://user:pass@host/dbname  # перезаписывается в env.py

# Если что-то понадобится из ruff/black/isort на post-write-hooks — настроим тут.
# [post_write_hooks]
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
