# Минимальный nginx-конфиг для production.
# Проксирует /api/* в backend, отдаёт фронтенд статикой.
# HTTPS оставлен закомментированным — настрой когда будет домен и certbot.

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Increase для импорта CSV.
    client_max_body_size 20M;

    upstream backend {
        server backend:8000;
    }

    server {
        listen 80;
        server_name _;

        # API → backend
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Frontend (SPA) — отдаём index.html для всех несуществующих путей.
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }
    }

    # HTTPS — раскомментируй когда настроишь сертификаты.
    # server {
    #     listen 443 ssl http2;
    #     server_name anfinances.example.com;
    #     ssl_certificate /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     # ... те же location-блоки ...
    # }
}
