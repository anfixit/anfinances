# Production nginx: HTTP → HTTPS редирект + ACME-челлендж, HTTPS-сервер
# проксирует /api/* в backend и отдаёт SPA. TLS — Let's Encrypt (certbot).
#
# Перед запуском замени your-domain.tld на свой домен (4 вхождения):
#   sed -i 's/your-domain.tld/anfinances.example.com/g' nginx/nginx.conf
# Первый сертификат получается скриптом scripts/init-letsencrypt.sh.

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Increase для импорта/восстановления бэкапа.
    client_max_body_size 20M;

    upstream backend {
        server backend:8000;
    }

    # ── HTTP: только ACME-челлендж и редирект на HTTPS ──────────────
    server {
        listen 80;
        server_name your-domain.tld;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS ───────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name your-domain.tld;

        ssl_certificate /etc/letsencrypt/live/your-domain.tld/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/your-domain.tld/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security-заголовки.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # API → backend
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Frontend (SPA) — index.html для всех несуществующих путей.
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }
    }
}
