# Deploy-окружение: образы тянутся из GHCR, на сервере ничего не собирается.
# .env рендерится pipeline'ом из GitHub Secrets (в гит не коммитится).
#
# Топология:
#   caddy (80/443, авто-TLS) → frontend (nginx: SPA + /api proxy) → backend
#                                                                  → postgres
# postgres наружу не публикуется; фронт и бэкенд видны только внутри сети,
# наружу смотрит только Caddy.
#
# Запуск (делает CI по SSH):
#   docker compose -f docker-compose.deploy.yml pull
#   docker compose -f docker-compose.deploy.yml up -d
#   docker compose -f docker-compose.deploy.yml exec backend alembic upgrade head
#
# Переменные IMAGE_BACKEND / IMAGE_FRONTEND прокидывает pipeline.
# Домен задаётся в caddy/Caddyfile и в CORS_ORIGINS ниже (один sed на оба).

services:
  postgres:
    image: postgres:16-alpine
    container_name: anfinances-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-anfinances}
      # Без дефолта: если секрет не дорендерился — compose упадёт громко,
      # а не поднимет прод с предсказуемым паролем "anfinances".
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-anfinances}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-anfinances} -d ${POSTGRES_DB:-anfinances}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ${IMAGE_BACKEND}
    container_name: anfinances-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    # Прод-тумблеры заданы здесь (перебивают backend/.env): они не секреты
    # и должны быть под контролем версий. Секреты (SECRET_KEY,
    # POSTGRES_PASSWORD, SINGLE_USER_*) приходят из env_file.
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      ENVIRONMENT: production
      DEBUG: "false"
      COOKIE_SECURE: "true"
      # SPA и API на одном origin, так что CORS фактически не задействован,
      # но в проде держим реальный домен, а не localhost.
      CORS_ORIGINS: '["https://anfinances.ru"]'
    env_file:
      - ./backend/.env
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    expose:
      - "8000"

  frontend:
    image: ${IMAGE_FRONTEND}
    container_name: anfinances-frontend
    restart: always
    depends_on:
      - backend
    # Наружу не публикуется: трафик приходит только через Caddy.
    expose:
      - "80"

  caddy:
    image: caddy:2-alpine
    container_name: anfinances-caddy
    restart: always
    depends_on:
      - frontend
    ports:
       # HTTP доступен только системному nginx на этом сервере.
       # nginx :80 проксирует anfinances.ru в Caddy.
      - "127.0.0.1:8080:80"

        # Публичный HTTPS Anfinances.
      - "8443:8443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      # Персистентность сертификатов между деплоями — иначе LE rate-limit.
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
    name: anfinances_postgres_data
  caddy_data:
    name: anfinances_caddy_data
  caddy_config:
    name: anfinances_caddy_config
